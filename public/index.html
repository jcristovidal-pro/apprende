<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofía — Tu tutora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --teal-mid: #5DCAA5;
      --teal-dark: #085041;
      --amber: #EF9F27;
      --amber-light: #FAEEDA;
      --amber-dark: #633806;
      --purple: #7F77DD;
      --purple-light: #EEEDFE;
      --purple-dark: #26215C;
      --coral: #D85A30;
      --coral-light: #FAECE7;
      --green: #639922;
      --green-light: #EAF3DE;
      --bg: #f4fbf7;
      --card: #ffffff;
      --text: #2C2C2A;
      --muted: #888780;
      --border: #ddf0e8;
      --radius: 20px;
      --shadow: 0 2px 16px rgba(29,158,117,0.10);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--card);
      border-bottom: 1.5px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .sofia-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--teal-mid), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(29,158,117,0.30);
    }
    .header-info { flex: 1; }
    .header-name {
      font-family: 'Fredoka One', cursive;
      font-size: 20px; color: var(--teal);
      line-height: 1.1;
    }
    .header-sub { font-size: 12px; color: var(--muted); }
    .stars-badge {
      background: var(--amber-light);
      color: var(--amber-dark);
      font-size: 14px; font-weight: 800;
      padding: 6px 14px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
      border: 1.5px solid #FAC775;
    }

    /* TABS */
    .tabs {
      display: flex; gap: 8px;
      padding: 12px 16px 10px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 10px 8px; border-radius: 14px;
      border: 2px solid transparent; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800;
      transition: all 0.2s; text-align: center;
      background: var(--bg); color: var(--muted);
    }
    .tab.active-math {
      background: var(--teal-light);
      border-color: var(--teal);
      color: var(--teal-dark);
    }
    .tab.active-read {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple-dark);
    }
    .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

    /* PROGRESS */
    .progress-wrap {
      padding: 10px 16px 6px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .progress-label {
      font-size: 12px; color: var(--muted);
      margin-bottom: 5px;
      display: flex; justify-content: space-between;
      font-weight: 600;
    }
    .progress-track {
      height: 8px; background: #e4f0ea; border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, var(--teal-mid), var(--teal));
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .progress-fill.read-fill {
      background: linear-gradient(90deg, #AFA9EC, var(--purple));
    }

    /* CHAT */
    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--teal-light); border-radius: 4px; }

    .msg-wrap { display: flex; flex-direction: column; gap: 3px; }
    .msg-wrap.from-sofia { align-items: flex-start; }
    .msg-wrap.from-user { align-items: flex-end; }

    .sender-label {
      font-size: 11px; font-weight: 700;
      color: var(--teal); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 2px;
    }

    .bubble {
      max-width: 86%; padding: 12px 16px;
      border-radius: 18px; font-size: 15px; line-height: 1.65;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bubble.sofia {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .bubble.user {
      background: var(--teal);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.user-read {
      background: var(--purple);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.celebration {
      background: var(--amber-light);
      border: 2px solid #FAC775;
      border-bottom-left-radius: 4px;
      font-weight: 700; color: var(--amber-dark);
      box-shadow: 0 2px 12px rgba(239,159,39,0.15);
    }
    .bubble.encouragement {
      background: var(--purple-light);
      border: 1.5px solid #AFA9EC;
      border-bottom-left-radius: 4px;
      color: var(--purple-dark);
    }

    /* OPTIONS */
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 12px;
    }
    .option-btn {
      padding: 12px 10px; border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--bg); cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      transition: all 0.18s; color: var(--text);
      text-align: center;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--teal); background: var(--teal-light);
      transform: translateY(-1px);
    }
    .option-btn.read-btn:hover:not(:disabled) {
      border-color: var(--purple); background: var(--purple-light);
    }
    .option-btn.correct {
      background: var(--green-light); border-color: var(--green);
      color: #173404;
    }
    .option-btn.wrong {
      background: var(--coral-light); border-color: var(--coral);
      color: #4A1B0C;
    }
    .option-btn.read-correct {
      background: var(--purple-light); border-color: var(--purple);
      color: var(--purple-dark);
    }
    .option-btn:disabled { cursor: default; }

    /* TYPING */
    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 4px 2px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--teal-mid);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* NEXT BTN */
    .next-btn {
      display: none; margin-top: 6px;
      padding: 12px 22px; border-radius: 16px;
      border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 800;
      background: var(--teal); color: white;
      transition: all 0.2s;
      animation: slideIn 0.3s ease;
    }
    .next-btn.show { display: inline-block; }
    .next-btn:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .next-btn:active { transform: scale(0.97); }
    .next-btn.read-next { background: var(--purple); }
    .next-btn.read-next:hover { background: #3C3489; }

    /* INPUT */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--card);
      border-top: 1.5px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .text-input {
      flex: 1; padding: 11px 14px;
      border-radius: 18px;
      border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif;
      font-size: 14px; resize: none;
      min-height: 44px; max-height: 100px;
      color: var(--text); background: var(--bg);
      outline: none; transition: border 0.2s;
      line-height: 1.5;
    }
    .text-input:focus { border-color: var(--teal); }
    .text-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--teal); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white;
      transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(29,158,117,0.30);
    }
    .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .bubble { max-width: 94%; font-size: 14px; }
      .header-name { font-size: 17px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="sofia-avatar">🦋</div>
    <div class="header-info">
      <div class="header-name">Sofía</div>
      <div class="header-sub">Tu tutora, siempre aquí para ti</div>
    </div>
    <div class="stars-badge">⭐ <span id="star-count">0</span></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active-math" id="tab-math" onclick="switchSubject('math')">
      <span class="tab-icon">🔢</span>Matemáticas
    </button>
    <button class="tab" id="tab-read" onclick="switchSubject('read')">
      <span class="tab-icon">📖</span>Lectura
    </button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Ejercicio 1 de 5</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat"></div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea
      class="text-input"
      id="user-input"
      placeholder="Escribe una pregunta a Sofía..."
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendFreeText();}"
    ></textarea>
    <button class="send-btn" onclick="sendFreeText()">➤</button>
  </div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────────
  let subject      = 'math';
  let stars        = 0;
  let exerciseIdx  = 0;
  let answered     = false;

  // ─── EXERCISES ───────────────────────────────────────────────────────────
  const MATH = [
    { q:"¿Cuánto es 7 + 5?",               opts:["10","12","11","13"],              ans:"12",    emoji:"🍎" },
    { q:"¿Cuánto es 20 − 8?",              opts:["14","10","12","11"],              ans:"12",    emoji:"🎈" },
    { q:"¿Cuánto es 3 × 4?",               opts:["10","12","7","14"],               ans:"12",    emoji:"🌟" },
    { q:"¿La mitad de 18 es…?",            opts:["7","10","9","8"],                 ans:"9",     emoji:"🍕" },
    { q:"¿Cuánto es 15 + 9?",              opts:["22","25","24","23"],              ans:"24",    emoji:"🦋" },
    { q:"¿Cuánto es 8 × 3?",               opts:["21","24","18","27"],              ans:"24",    emoji:"🚀" },
    { q:"¿Cuánto es 50 − 17?",             opts:["33","23","43","37"],              ans:"33",    emoji:"🎯" },
    { q:"¿Cuánto es 6 + 14 + 5?",          opts:["23","25","20","27"],              ans:"25",    emoji:"🌈" },
    { q:"¿Cuánto es 72 ÷ 9?",              opts:["7","9","8","6"],                  ans:"8",     emoji:"🍦" },
    { q:"Si tengo 30 y gasto 13, ¿cuánto me queda?", opts:["17","18","15","16"],   ans:"17",    emoji:"💰" },
  ];

  const READ = [
    { q:'Lee: "El gato bebió leche y luego se durmió."\n\n¿Qué hizo el gato primero?',
      opts:["Durmió","Bebió leche","Jugó","Comió"],           ans:"Bebió leche", emoji:"🐱" },
    { q:'Lee: "María tiene 3 lápices rojos y 2 azules."\n\n¿Cuántos lápices tiene en total?',
      opts:["4","6","5","3"],                                  ans:"5",           emoji:"✏️" },
    { q:'Lee: "El cielo se nubló y pronto llovió."\n\n¿Qué pasó después de que se nubló?',
      opts:["Salió el sol","Llovió","Hizo frío","Hubo viento"],ans:"Llovió",      emoji:"🌧️" },
    { q:'Lee: "Ana corrió muy rápido y ganó la carrera. Todos la aplaudieron."\n\n¿Cómo se sentía Ana?',
      opts:["Triste","Enojada","Feliz","Asustada"],            ans:"Feliz",       emoji:"🏆" },
    { q:'Lee: "En verano las hojas eran verdes, en otoño se volvieron amarillas."\n\n¿De qué color eran en otoño?',
      opts:["Verdes","Rojas","Amarillas","Azules"],            ans:"Amarillas",   emoji:"🍂" },
    { q:'Lee: "Pedro comió manzana, naranja y uva."\n\n¿Cuántas frutas comió?',
      opts:["2","4","3","5"],                                  ans:"3",           emoji:"🍇" },
    { q:'Lee: "El perro ladró fuerte cuando escuchó un ruido extraño."\n\n¿Por qué ladró el perro?',
      opts:["Tenía hambre","Escuchó un ruido","Quería jugar","Estaba cansado"], ans:"Escuchó un ruido", emoji:"🐶" },
    { q:'Lee: "La maestra escribió la tarea en el pizarrón antes de salir."\n\n¿Dónde escribió la maestra?',
      opts:["En un papel","En su cuaderno","En el pizarrón","En la pared"], ans:"En el pizarrón", emoji:"📝" },
  ];

  const exercises = () => subject === 'math' ? MATH : READ;

  // ─── HELPERS ─────────────────────────────────────────────────────────────
  const chat = () => document.getElementById('chat');

  function scrollBottom() {
    const c = chat();
    c.scrollTop = c.scrollHeight;
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function addBubble(html, type) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + (type.startsWith('user') ? 'from-user' : 'from-sofia');
    if (!type.startsWith('user')) {
      wrap.innerHTML = `<div class="sender-label">✨ Sofía</div><div class="bubble ${type}">${html}</div>`;
    } else {
      wrap.innerHTML = `<div class="bubble ${type}">${html}</div>`;
    }
    chat().appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap from-sofia';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `<div class="sender-label">✨ Sofía</div>
      <div class="bubble sofia"><div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div></div>`;
    chat().appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function updateProgress() {
    const total = exercises().length;
    const done  = Math.min(exerciseIdx, total);
    const pct   = Math.round((done / total) * 100);
    document.getElementById('progress-text').textContent =
      `Ejercicio ${Math.min(exerciseIdx + 1, total)} de ${total}`;
    document.getElementById('progress-pct').textContent = pct + '%';
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (subject === 'read' ? ' read-fill' : '');
  }

  // ─── EXERCISE FLOW ────────────────────────────────────────────────────────
  async function startExercise() {
    const list = exercises();
    if (exerciseIdx >= list.length) { await finishSession(); return; }

    answered = false;
    updateProgress();
    const ex = list[exerciseIdx];

    showTyping();
    await wait(900);
    removeTyping();

    const isRead   = subject === 'read';
    const btnClass = 'option-btn' + (isRead ? ' read-btn' : '');
    const nextCls  = 'next-btn' + (isRead ? ' read-next' : '');

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap from-sofia';
    wrap.innerHTML = `
      <div class="sender-label">✨ Sofía</div>
      <div class="bubble sofia">
        <div style="font-size:26px;margin-bottom:8px">${ex.emoji}</div>
        <div style="white-space:pre-line;margin-bottom:2px">${ex.q}</div>
        <div class="options-grid" id="opts-grid">
          ${ex.opts.map(o =>
            `<button class="${btnClass}"
              onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}','${ex.ans.replace(/'/g,"\\'")}','${nextCls}')"
            >${o}</button>`
          ).join('')}
        </div>
      </div>
      <button class="${nextCls}" id="next-btn" onclick="nextExercise()">Siguiente →</button>
    `;
    chat().appendChild(wrap);
    scrollBottom();
  }

  const PRAISES = [
    "¡Increíble! ¡Lo lograste! 🎉",
    "¡Muy bien! ¡Eres brillante! ⭐",
    "¡Exacto! ¡Qué inteligente eres! 🌟",
    "¡Perfecto! ¡Sigue así, campeona! 🏆",
    "¡Wow, eso estuvo genial! ¡Ganaste una estrella! ✨",
    "¡Así se hace! ¡Estoy tan orgullosa de ti! 💛",
  ];
  const ENCOURAGEMENTS = (ans) => [
    `No pasa nada, ¡la respuesta era <strong>${ans}</strong>! Cada error nos enseña algo nuevo. 💪`,
    `¡Casi! Era <strong>${ans}</strong>. ¡Tú puedes, sigue intentando! 🌈`,
    `Esta estaba difícil. La respuesta es <strong>${ans}</strong>. ¡En el siguiente lo logras! 😊`,
  ];

  async function checkAnswer(btn, chosen, correct, nextClass) {
    if (answered) return;
    answered = true;

    const grid = document.getElementById('opts-grid');
    grid.querySelectorAll('button').forEach(b => { b.disabled = true; b.onclick = null; });

    if (chosen === correct) {
      btn.classList.add('correct');
      stars++;
      document.getElementById('star-count').textContent = stars;
      showTyping(); await wait(650); removeTyping();
      addBubble(PRAISES[Math.floor(Math.random() * PRAISES.length)], 'celebration');
    } else {
      btn.classList.add('wrong');
      const correctBtn = Array.from(grid.querySelectorAll('button'))
        .find(b => b.textContent.trim() === correct);
      if (correctBtn) correctBtn.classList.add(subject === 'read' ? 'read-correct' : 'correct');
      showTyping(); await wait(650); removeTyping();
      const enc = ENCOURAGEMENTS(correct);
      addBubble(enc[Math.floor(Math.random() * enc.length)], 'encouragement');
    }

    const nb = document.getElementById('next-btn');
    if (nb) nb.classList.add('show');
    scrollBottom();
  }

  function nextExercise() {
    exerciseIdx++;
    startExercise();
  }

  async function finishSession() {
    showTyping(); await wait(1000); removeTyping();
    const subName = subject === 'math' ? 'Matemáticas' : 'Lectura';
    addBubble(
      `¡Terminaste todos los ejercicios de <strong>${subName}</strong>! 🎊<br><br>` +
      `Juntaste <strong>${stars} estrella${stars !== 1 ? 's' : ''}</strong> hoy. ` +
      `¡Eso es un logro enorme! Estoy muy orgullosa de ti. 💛`,
      'celebration'
    );
    await wait(400);
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap from-sofia';
    wrap.innerHTML = `<button class="next-btn show" style="margin-top:4px" onclick="restartSession()">¡Practicar de nuevo! 🔁</button>`;
    chat().appendChild(wrap);
    scrollBottom();
  }

  function restartSession() {
    exerciseIdx = 0;
    answered = false;
    chat().innerHTML = '';
    startSession();
  }

  async function switchSubject(s) {
    if (s === subject && exerciseIdx === 0) return;
    subject = s;
    exerciseIdx = 0;
    answered = false;
    document.getElementById('tab-math').className = 'tab' + (s === 'math' ? ' active-math' : '');
    document.getElementById('tab-read').className = 'tab' + (s === 'read' ? ' active-read' : '');
    chat().innerHTML = '';
    await startSession();
  }

  // ─── FREE TEXT → API PROXY ────────────────────────────────────────────────
  async function sendFreeText() {
    const inp = document.getElementById('user-input');
    const val = inp.value.trim();
    if (!val) return;
    inp.value = '';
    inp.style.height = 'auto';

    addBubble(val, subject === 'read' ? 'user-read' : 'user');
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: val })
      });
      const data = await res.json();
      removeTyping();
      addBubble(data.reply || '¡Claro! Aquí estoy para ayudarte. 😊', 'sofia');
    } catch (e) {
      removeTyping();
      addBubble('¡Ups! Algo salió mal con la conexión. Intenta de nuevo. 😊', 'sofia');
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  async function startSession() {
    updateProgress();
    showTyping(); await wait(800); removeTyping();
    const subName = subject === 'math' ? 'Matemáticas' : 'Lectura';
    const emoji   = subject === 'math' ? '🔢' : '📖';
    addBubble(
      `¡Hola! Soy Sofía, tu tutora ${emoji}<br><br>` +
      `Hoy vamos a practicar <strong>${subName}</strong> juntas. ` +
      `¡Sin prisa, a tu ritmo! Si te equivocas, no importa — ` +
      `aprender es un proceso y yo siempre voy a estar aquí para ayudarte. 😊<br><br>` +
      `¿Lista? ¡Empecemos!`,
      'sofia'
    );
    await wait(400);
    startExercise();
  }

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  startSession();
</script>
</body>
